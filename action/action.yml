name: 'PromptCanary'
description: 'Run prompt regression tests against LLM providers. Catch model drift before your users do.'
author: 'PromptCanary'

inputs:
  config:
    description: 'Path to the PromptCanary config file (YAML)'
    required: false
    default: 'promptcanary.yaml'
  fail-on-drift:
    description: 'Fail the workflow if any assertions fail'
    required: false
    default: 'true'
  comment-on-pr:
    description: 'Post results as a PR comment (requires GITHUB_TOKEN)'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

outputs:
  passed:
    description: 'Number of passed tests'
    value: ${{ steps.run.outputs.passed }}
  failed:
    description: 'Number of failed tests'
    value: ${{ steps.run.outputs.failed }}
  summary:
    description: 'Markdown summary of test results'
    value: ${{ steps.run.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install PromptCanary
      shell: bash
      run: npm install -g promptcanary

    - name: Validate config
      shell: bash
      run: |
        if [ ! -f "${{ inputs.config }}" ]; then
          echo "::error::Config file not found: ${{ inputs.config }}"
          exit 1
        fi
        echo "Config file found: ${{ inputs.config }}"

    - name: Run tests
      id: run
      shell: bash
      run: |
        set +e
        OUTPUT=$(npx promptcanary run "${{ inputs.config }}" --json 2>&1)
        EXIT_CODE=$?
        set -e

        # Parse JSON output for passed/failed counts
        PASSED=$(echo "$OUTPUT" | grep -o '"passed":[0-9]*' | head -1 | cut -d: -f2)
        FAILED=$(echo "$OUTPUT" | grep -o '"failed":[0-9]*' | head -1 | cut -d: -f2)
        PASSED=${PASSED:-0}
        FAILED=${FAILED:-0}

        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

        # Build summary
        if [ "$FAILED" -gt 0 ]; then
          SUMMARY="❌ **PromptCanary**: $FAILED test(s) failed, $PASSED passed"
        else
          SUMMARY="✅ **PromptCanary**: All $PASSED test(s) passed"
        fi
        echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

        # Write step summary
        echo "## PromptCanary Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

        # Fail if configured
        if [ "${{ inputs.fail-on-drift }}" = "true" ] && [ "$FAILED" -gt 0 ]; then
          echo "::error::$FAILED test(s) failed. Set fail-on-drift: false to continue anyway."
          exit 1
        fi

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const passed = '${{ steps.run.outputs.passed }}';
          const failed = '${{ steps.run.outputs.failed }}';
          const summary = '${{ steps.run.outputs.summary }}';

          const body = `## 🐤 PromptCanary Results\n\n${summary}\n\n| Metric | Count |\n|--------|-------|\n| ✅ Passed | ${passed} |\n| ❌ Failed | ${failed} |\n\n<sub>Generated by [PromptCanary](https://github.com/VebjornNyvoll/promptcanary)</sub>`;

          // Find existing comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body?.includes('PromptCanary Results'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

branding:
  icon: 'shield'
  color: 'yellow'
