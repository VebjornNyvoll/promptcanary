# Multi-provider PromptCanary test configuration
# Tests prompts across OpenAI and Anthropic for cross-provider portability
version: "1"

config:
  providers:
    - name: openai
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
      temperature: 0.2

    - name: anthropic
      model: claude-sonnet-4-20250514
      api_key_env: ANTHROPIC_API_KEY
      temperature: 0.2

tests:
  - name: "Summarization quality"
    prompt: "Summarize the following in 3 bullet points: {{article}}"
    variables:
      article: >
        NASA's James Webb Space Telescope has captured unprecedented images of
        distant galaxies, revealing details about the early universe that were
        previously invisible. The telescope's infrared capabilities allow it to
        peer through cosmic dust, uncovering newborn stars and ancient galaxy
        formations dating back over 13 billion years.
    expect:
      format: bullet_points
      max_length: 500
      must_contain: ["James Webb", "galaxies"]
      must_not_contain: ["error"]

  - name: "Code generation consistency"
    prompt: "Write a Python function that reverses a string"
    providers: ["openai"]  # Only test with OpenAI for this case
    expect:
      must_contain: ["def ", "return"]
      must_not_contain: ["TODO", "pass  #"]
      max_length: 500
